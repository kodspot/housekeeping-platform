<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#1a7f64">
<title>Admin Login — Kodspot</title>
<link rel="stylesheet" href="/css/design-system.css?v=6">
</head>
<body class="auth-layout">
<div class="auth-card">
  <h1 class="auth-title" id="brandTitle">Kodspot</h1>
  <p class="auth-subtitle" id="brandSub">Admin — Sign in to manage your facility</p>
  <div id="error" class="error-msg"></div>

  <form id="loginForm">
    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input class="form-input" type="email" id="email" required autocomplete="email" placeholder="admin@facility.com">
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
    </div>
    <div id="orgSelect" style="display:none" class="form-group">
      <label class="form-label" for="orgId">Select Organization</label>
      <select class="form-select" id="orgId"></select>
    </div>
    <button type="submit" class="btn btn-primary btn-block" id="btn">Sign In</button>
  </form>

  <p style="margin-top:var(--sp-lg);font-size:.8rem;color:var(--text-light);text-align:center">
    <a href="/" style="color:var(--primary)">&larr; Back to Home</a>
  </p>
</div>

<script src="/js/app.js?v=6"></script>
<script src="/js/custom-select.js"></script>
<script>
var $ = App.$;
var orgSlug = App.getOrgSlug();
var mod = App.getModule();

// Set dynamic manifest for this module
App.initModulePWA();

// Show org branding if accessed via org URL
if (orgSlug) {
  fetch('/api/org/' + encodeURIComponent(orgSlug)).then(function(r) { return r.ok ? r.json() : null; }).then(function(org) {
    if (org && org.name) {
      $('brandTitle').textContent = org.name;
      $('brandSub').innerHTML = 'Admin Login <span style="display:block;margin-top:.3rem;font-size:.72rem;color:var(--text-light)">Powered by Kodspot</span>';
      document.title = 'Admin Login — ' + org.name;
      localStorage.setItem('orgName', org.name);
    }
  }).catch(function() {});
}

function showErr(msg) { $('error').textContent = msg; $('error').style.display = 'block'; }
function hideErr() { $('error').style.display = 'none'; }

$('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault(); hideErr();
  var btn = $('btn'); btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    var body = { email: $('email').value, password: $('password').value };
    var orgId = $('orgId').value;
    if (orgId) body.orgId = orgId;
    if (orgSlug) body.orgSlug = orgSlug;
    var res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    var data = await res.json();
    if (res.status === 400 && data.organizations) {
      $('orgSelect').style.display = 'block';
      var sel = $('orgId');
      sel.innerHTML = data.organizations.map(function(o) { return '<option value="' + o.orgId + '">' + o.role + ' — ' + o.orgId.slice(0, 8) + '</option>'; }).join('');
      showErr('Multiple accounts found. Select an organization.');
      return;
    }
    if (!res.ok) { showErr(data.error || 'Login failed'); return; }
    if (!data.token || !data.user) { showErr('Invalid server response'); return; }
    if (data.user.role !== 'ADMIN') {
      showErr('This login is for organization admins only.'); return;
    }
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    localStorage.setItem('activeModule', mod);
    var slug = data.user.orgSlug || orgSlug;
    if (slug) localStorage.setItem('orgSlug', slug);
    if (data.user.orgName) localStorage.setItem('orgName', data.user.orgName);
    location.href = App.orgPath('admin-dashboard');
  } catch (err) { showErr('Network error. Please try again.'); }
  finally { btn.disabled = false; btn.textContent = 'Sign In'; }
});

// Redirect if already logged in as ADMIN
if (localStorage.getItem('token')) {
  var u = JSON.parse(localStorage.getItem('user') || '{}');
  if (u.role === 'ADMIN') location.href = App.orgPath('admin-dashboard');
}
</script>
<footer style="position:fixed;bottom:0;left:0;right:0;text-align:center;padding:.8rem;font-size:.75rem;color:var(--text-muted)">
  <a href="/privacy" style="color:var(--text-muted);text-decoration:underline">Privacy Policy</a> · <a href="/terms" style="color:var(--text-muted);text-decoration:underline">Terms of Service</a>
</footer>
</body>
</html>
