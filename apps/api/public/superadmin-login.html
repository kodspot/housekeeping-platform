<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#1a7f64">
<title>Super Admin Login — Kodspot</title>
<link rel="stylesheet" href="/css/design-system.css?v=4">
<style>
  .auth-card { border-top: 4px solid #4338CA; }
  .auth-subtitle { color: #4338CA; }
</style>
</head>
<body class="auth-layout">
<div class="auth-card">
  <h1 class="auth-title">Kodspot</h1>
  <p class="auth-subtitle">Super Admin Access</p>
  <div id="error" class="error-msg"></div>

  <form id="saLoginForm">
    <div class="form-group">
      <label class="form-label" for="adminKey">Admin Key</label>
      <input class="form-input" type="password" id="adminKey" required placeholder="Enter your admin key">
    </div>
    <button type="submit" class="btn btn-sa btn-block" id="saBtn">Sign In</button>
  </form>

  <div class="text-center mt-md">
    <a href="#" id="bootstrapLink" style="font-size:.8rem;color:#4338CA">First time setup?</a>
  </div>
  <div id="bootstrapForm" style="display:none;margin-top:var(--sp-md);padding-top:var(--sp-md);border-top:1px solid var(--border)">
    <h2 style="font-size:1.05rem;margin-bottom:.75rem">Bootstrap Super Admin</h2>
    <form id="bForm">
      <div class="form-group"><label class="form-label" for="bKey">Admin Key</label><input class="form-input" type="password" id="bKey" required></div>
      <div class="form-group"><label class="form-label" for="bName">Name</label><input class="form-input" type="text" id="bName" required></div>
      <div class="form-group"><label class="form-label" for="bEmail">Email</label><input class="form-input" type="email" id="bEmail" required></div>
      <div class="form-group"><label class="form-label" for="bPass">Password (min 8 chars)</label><input class="form-input" type="password" id="bPass" required minlength="8"></div>
      <button type="submit" class="btn btn-sa btn-block" id="bBtn">Create Super Admin</button>
    </form>
  </div>

  <p style="margin-top:var(--sp-lg);font-size:.8rem;color:var(--text-light);text-align:center">
    <a href="/" style="color:#4338CA">&larr; Back to Home</a>
  </p>
</div>

<script src="/js/app.js?v=3"></script>
<script>
var $ = App.$;

function showErr(msg) { $('error').textContent = msg; $('error').style.display = 'block'; }
function hideErr() { $('error').style.display = 'none'; }

// SA Login
$('saLoginForm').addEventListener('submit', async function(e) {
  e.preventDefault(); hideErr();
  var btn = $('saBtn'); btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    var res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminKey: $('adminKey').value }) });
    var data = await res.json();
    if (!res.ok) { showErr(data.error || 'Login failed'); return; }
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    location.href = '/superadmin-dashboard';
  } catch (err) { showErr('Network error. Please try again.'); }
  finally { btn.disabled = false; btn.textContent = 'Sign In'; }
});

// Bootstrap
$('bootstrapLink').addEventListener('click', function(e) {
  e.preventDefault();
  $('bootstrapForm').style.display = $('bootstrapForm').style.display === 'none' ? 'block' : 'none';
});

$('bForm').addEventListener('submit', async function(e) {
  e.preventDefault(); hideErr();
  var btn = $('bBtn'); btn.disabled = true; btn.textContent = 'Creating…';
  try {
    var res = await fetch('/api/auth/bootstrap', { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminKey: $('bKey').value, name: $('bName').value, email: $('bEmail').value, password: $('bPass').value }) });
    var data = await res.json();
    if (!res.ok) { showErr(data.error || 'Bootstrap failed'); return; }
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    location.href = '/superadmin-dashboard';
  } catch (err) { showErr('Network error'); }
  finally { btn.disabled = false; btn.textContent = 'Create Super Admin'; }
});

// Redirect if already logged in as SA
if (localStorage.getItem('token')) {
  var u = JSON.parse(localStorage.getItem('user') || '{}');
  if (u.role === 'SUPER_ADMIN') location.href = '/superadmin-dashboard';
}
</script>
<footer style="position:fixed;bottom:0;left:0;right:0;text-align:center;padding:.8rem;font-size:.75rem;color:var(--text-muted)">
  <a href="/privacy" style="color:var(--text-muted);text-decoration:underline">Privacy Policy</a> · <a href="/terms" style="color:var(--text-muted);text-decoration:underline">Terms of Service</a>
</footer>
</body>
</html>
