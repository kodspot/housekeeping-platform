<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#1a7f64">
<title>Scan QR — Kodspot</title>
<link rel="stylesheet" href="/css/design-system.css?v=3">
<style>
.sv-shell{max-width:480px;margin:0 auto;padding:1.25rem .75rem;min-height:calc(100dvh - 56px)}

/* Scanner area */
.scan-hero{text-align:center;margin-bottom:1.25rem}
.scan-hero h2{font-size:1.1rem;font-weight:700;margin-bottom:.25rem}
.scan-hero p{font-size:.78rem;color:var(--text-muted)}

#videoWrap{position:relative;width:100%;border-radius:var(--radius-lg);overflow:hidden;background:#000;margin-bottom:1rem;display:none}
#videoWrap video{width:100%;display:block}
.scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-frame{width:190px;height:190px;border:2.5px solid var(--primary);border-radius:14px;box-shadow:0 0 0 2000px rgba(0,0,0,.45)}
.scan-hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.65);color:#fff;font-size:.7rem;padding:.25rem .6rem;border-radius:var(--radius);white-space:nowrap}

/* Camera button */
.scan-start-btn{display:flex;flex-direction:column;align-items:center;gap:.6rem;background:var(--surface);border:2px dashed var(--border);border-radius:var(--radius-lg);padding:2rem 1rem;cursor:pointer;transition:border-color .15s;width:100%;text-align:center;margin-bottom:1rem}
.scan-start-btn:hover{border-color:var(--primary)}
.scan-start-icon{font-size:2.2rem;opacity:.8}
.scan-start-text{font-size:.88rem;font-weight:600;color:var(--text)}
.scan-start-sub{font-size:.72rem;color:var(--text-muted)}

/* Manual entry */
.manual-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem}
.manual-section h3{font-size:.82rem;font-weight:600;margin-bottom:.6rem;color:var(--text-muted)}
.manual-row{display:flex;gap:.5rem}
.manual-row .form-input{flex:1;text-transform:uppercase;font-weight:600;letter-spacing:.05em}

/* Location card */
.loc-result{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.15rem;margin-top:1rem;display:none}
.loc-result.show{display:block}
.loc-result-header{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.5rem}
.loc-result-icon{font-size:1.3rem;flex-shrink:0;margin-top:.05rem}
.loc-result h3{font-size:1rem;font-weight:700;line-height:1.3;margin:0}
.loc-result-type{font-size:.78rem;color:var(--text-muted);margin-bottom:.85rem}

@media(max-width:480px){
  .sv-shell{padding:.85rem .5rem}
  .scan-start-btn{padding:1.5rem .75rem}
  .manual-section{padding:.85rem}
}
</style>
</head>
<body>
<nav class="topbar">
  <div class="topbar-left">
    <span class="topbar-brand">Kodspot</span>
    <div class="sv-nav" id="sv-nav">
      <a href="/supervisor-scan" class="sv-nav-link active"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 012-2h2"/><path d="M17 3h2a2 2 0 012 2v2"/><path d="M21 17v2a2 2 0 01-2 2h-2"/><path d="M7 21H5a2 2 0 01-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>Scan</a>
      <a href="/supervisor-tickets" class="sv-nav-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 5H9a2 2 0 00-2 2v10a2 2 0 002 2h6a2 2 0 002-2V7a2 2 0 00-2-2z"/><path d="M12 11h.01"/><path d="M12 15h.01"/></svg>Tickets</a>
    </div>
  </div>
  <div class="topbar-right">
    <span class="topbar-user" id="userName"></span>
    <button class="btn btn-sm btn-ghost" onclick="App.logoutSup()">Logout</button>
  </div>
</nav>

<div class="sv-shell">
  <div class="scan-hero">
    <h2>Scan Location QR</h2>
    <p>Point your camera at the QR code posted at the location</p>
  </div>

  <div id="videoWrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="scan-overlay">
      <div class="scan-frame"></div>
    </div>
    <div class="scan-hint">Position QR inside the frame</div>
  </div>
  <button class="btn btn-ghost btn-sm" id="stopBtn" onclick="stopCamera()" style="display:none;margin:0 auto .75rem;width:100%;text-align:center;font-size:.82rem"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px"><rect x="3" y="3" width="18" height="18" rx="2"/></svg> Stop Camera</button>
  <div id="cameraError" class="error-msg" style="text-align:center"></div>

  <button class="scan-start-btn" id="startBtn" onclick="startCamera()">
    <span class="scan-start-icon"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg></span>
    <span class="scan-start-text">Tap to Open Camera</span>
    <span class="scan-start-sub">Scan location QR code</span>
  </button>

  <div class="manual-section">
    <h3>Or Enter Code Manually</h3>
    <div class="manual-row">
      <input class="form-input" type="text" id="manualCode" placeholder="e.g. ABC123" maxlength="20">
      <button class="btn btn-primary" onclick="lookupManual()">Look Up</button>
    </div>
  </div>

  <div class="loc-result" id="locationCard"></div>
</div>

<script src="/js/app.js?v=2"></script>
<script>
if (!App.initSupervisor()) throw '';
App.initNotifications(App.supFetch, 'supervisor');
var esc = App.esc, $ = App.$;
var videoEl = $('video'), stream = null, scanning = false;

async function startCamera() {
  $('startBtn').querySelector('.scan-start-text').textContent = 'Starting camera…';
  $('startBtn').style.pointerEvents = 'none';
  $('startBtn').style.opacity = '.6';
  App.hideError('cameraError');
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } } });
    $('startBtn').style.display = 'none';
    $('videoWrap').style.display = 'block';
    $('stopBtn').style.display = '';
    videoEl.srcObject = stream;
    scanning = true;
    if ('BarcodeDetector' in window) {
      var detector = new BarcodeDetector({ formats: ['qr_code'] });
      scanLoop(detector);
    } else {
      App.showError('cameraError', 'QR scanning not supported on this browser. Please enter code manually.');
    }
  } catch (e) {
    App.showError('cameraError', 'Camera access denied. Please enter code manually.');
    $('videoWrap').style.display = 'none';
    $('startBtn').querySelector('.scan-start-text').textContent = 'Tap to Open Camera';
    $('startBtn').style.pointerEvents = '';
    $('startBtn').style.opacity = '';
    $('startBtn').style.display = '';
  }
}

async function scanLoop(detector) {
  while (scanning) {
    try {
      var barcodes = await detector.detect(videoEl);
      if (barcodes.length > 0) {
        var code = barcodes[0].rawValue;
        if (code) { scanning = false; stopCamera(); lookupCode(code); return; }
      }
    } catch(e) {}
    await new Promise(function(r) { setTimeout(r, 300); });
  }
}

function stopCamera() {
  scanning = false;
  if (stream) { stream.getTracks().forEach(function(t) { t.stop(); }); stream = null; }
  $('videoWrap').style.display = 'none';
  $('stopBtn').style.display = 'none';
  $('startBtn').querySelector('.scan-start-text').textContent = 'Scan Again';
  $('startBtn').style.pointerEvents = '';
  $('startBtn').style.opacity = '';
  $('startBtn').style.display = '';
}

var _lookingUp = false;

function lookupManual() {
  var code = $('manualCode').value.trim();
  if (!code) return;
  lookupCode(code);
}

async function lookupCode(raw) {
  if (_lookingUp) return;
  _lookingUp = true;
  try {
  var code = raw;
  // Extract code from full URL patterns: /s/CODE, /scan/CODE, or just the code
  var urlMatch = raw.match(/\/s(?:can)?\/([A-Za-z0-9]+)/i);
  if (urlMatch) code = urlMatch[1];
  code = code.toUpperCase().trim();
  $('manualCode').value = code;
  $('locationCard').classList.remove('show');
  $('locationCard').innerHTML = '<div style="text-align:center;padding:1.5rem;color:var(--text-muted);font-size:.85rem">Looking up location…</div>';
  $('locationCard').classList.add('show');
  var res = await App.supFetch('/locations/qr/' + encodeURIComponent(code));
  if (!res) { $('locationCard').classList.remove('show'); return; }
  if (!res.ok) {
    App.toast('Location not found for: ' + code, 'error');
    $('locationCard').classList.remove('show');
    return;
  }
  var loc = await res.json();
  $('locationCard').innerHTML = '<div class="loc-result-header"><span class="loc-result-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></span><h3>' + esc(loc.name) + '</h3></div><p class="loc-result-type">' + esc(loc.type + (loc.parent ? ' in ' + loc.parent.name : '')) + '</p><a href="' + App.orgPath('supervisor-clean') + '?locationId=' + loc.id + '&name=' + encodeURIComponent(loc.name) + '" class="btn btn-success btn-block" style="text-decoration:none"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px"><path d="M3 21h4L20.06 7.94a1.5 1.5 0 00-2.12-2.12L4.88 18.88H3v2.12z"/></svg> Start Cleaning Record</a>';
  App.toast('Location found!', 'success');
  } finally { _lookingUp = false; }
}
</script>
</body>
</html>
