<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline — Kodspot Housekeeping</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8f9fa;color:#333;text-align:center;padding:2rem}
.offline-card{max-width:360px}
.offline-icon{font-size:3rem;margin-bottom:1rem}
h1{font-size:1.3rem;font-weight:700;margin-bottom:.5rem}
p{color:#666;font-size:.9rem;line-height:1.5;margin-bottom:1.5rem}
.btn{display:inline-block;padding:.6rem 1.5rem;background:#1a7f64;color:#fff;border:none;border-radius:8px;font-size:.9rem;cursor:pointer;text-decoration:none}
.btn:hover{background:#156b54}
</style>
</head>
<body>
<div class="offline-card">
  <div class="offline-icon">📡</div>
  <h1>You're Offline</h1>
  <p>Please check your internet connection and try again.</p>
  <button class="btn" onclick="location.reload()">Retry</button>
</div>
</body>
</html>
