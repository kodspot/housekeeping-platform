<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#1a7f64">
<title>Supervisor Login — Kodspot</title>
<link rel="stylesheet" href="/css/design-system.css?v=7">
</head>
<body class="auth-layout" data-theme="dark">
<div class="auth-card" style="max-width:380px">
  <h1 class="auth-title text-center" id="brandTitle">Kodspot</h1>
  <p class="auth-subtitle text-center" id="brandSub">Supervisor Login</p>
  <form id="loginForm">
    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input class="form-input" type="email" id="email" required autocomplete="email" inputmode="email">
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">Sign In</button>
    <div id="error" class="error-msg mt-sm text-center"></div>
  </form>
</div>
<script src="/js/app.js?v=7"></script>
<script>
var orgSlug = App.getOrgSlug();
var mod = App.getModule();

// Redirect if already logged in as supervisor
if (localStorage.getItem('sup_token')) location.href = App.orgPath('supervisor-scan');

// Initialise module PWA (dynamic manifest + service worker)
App.initModulePWA();

// Show org branding if accessed via org URL
if (orgSlug) {
  fetch('/api/org/' + encodeURIComponent(orgSlug)).then(function(r) { return r.ok ? r.json() : null; }).then(function(org) {
    if (org && org.name) {
      document.getElementById('brandTitle').textContent = org.name;
      document.getElementById('brandSub').innerHTML = 'Supervisor Login <span style="display:block;margin-top:.3rem;font-size:.72rem;color:var(--text-light)">Powered by Kodspot</span>';
      document.title = 'Supervisor Login \u2014 ' + org.name;
      localStorage.setItem('orgName', org.name);
    }
  }).catch(function() {});
}

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = document.getElementById('submitBtn'); btn.disabled = true; btn.textContent = 'Signing in…';
  document.getElementById('error').style.display = 'none';
  try {
    var body = { email: document.getElementById('email').value.trim(), password: document.getElementById('password').value };
    if (orgSlug) body.orgSlug = orgSlug;
    var res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body) });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    if (data.user.role !== 'SUPERVISOR') {
      document.getElementById('error').textContent = 'Access restricted to supervisors';
      document.getElementById('error').style.display = 'block'; btn.disabled = false; btn.textContent = 'Sign In'; return;
    }
    localStorage.setItem('sup_token', data.token);
    localStorage.setItem('sup_user', JSON.stringify({ id: data.user.id, name: data.user.name, orgId: data.user.orgId }));
    var slug = data.user.orgSlug || orgSlug;
    if (slug) localStorage.setItem('orgSlug', slug);
    if (data.user.orgName) localStorage.setItem('orgName', data.user.orgName);
    localStorage.setItem('activeModule', mod);
    location.href = App.orgPath('supervisor-scan');
  } catch (err) {
    document.getElementById('error').textContent = err.message;
    document.getElementById('error').style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign In';
  }
});
</script>
<footer style="position:fixed;bottom:0;left:0;right:0;text-align:center;padding:.8rem;font-size:.75rem;color:var(--text-muted)">
  <a href="/privacy" style="color:var(--text-muted);text-decoration:underline">Privacy Policy</a> · <a href="/terms" style="color:var(--text-muted);text-decoration:underline">Terms of Service</a>
</footer>
</body>
</html>
