<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#1a7f64">
<title>Workers — Kodspot</title>
<link rel="stylesheet" href="/css/design-system.css?v=7">
<style>
/* ── Summary bar ── */
.wk-summary{display:flex;gap:1rem;flex-wrap:wrap;padding:.6rem 0 .5rem;border-bottom:1px solid var(--border-light);margin-bottom:.75rem}
.wk-summary-item{font-size:.78rem;color:var(--text-muted)}
.wk-summary-item b{color:var(--text);font-weight:700}

/* ── Filter bar ── */
.wk-filters{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;margin-bottom:.75rem}
.wk-filters .form-input,.wk-filters .form-select{font-size:.82rem;height:36px}
.wk-filters .cs-trigger{font-size:.82rem;height:36px;min-height:36px}
.wk-search{min-width:180px;max-width:260px;flex:1}
.wk-dept-filter{min-width:130px;max-width:170px}
.wk-sort{min-width:130px;max-width:160px}

/* ── Table enhancements ── */
.wk-tbl{width:100%;border-collapse:collapse;font-size:.84rem}
.wk-tbl thead th{text-align:left;padding:.55rem .65rem;color:var(--text-muted);border-bottom:2px solid var(--border);font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;position:sticky;top:0;background:var(--surface);z-index:1}
.wk-tbl tbody td{padding:.55rem .65rem;border-bottom:1px solid var(--border-light);vertical-align:middle}
.wk-tbl tbody tr:nth-child(even) td{background:rgba(248,250,252,.5)}
.wk-tbl tbody tr:hover td{background:rgba(14,165,164,.04)}
.wk-tbl td:last-child{white-space:nowrap}
.wk-row-inactive td{opacity:.55}
.wk-name-cell{font-weight:600}
.wk-desig-sub{font-size:.7rem;color:var(--text-muted);font-weight:400;display:block;margin-top:1px}
.wk-doj{font-size:.75rem;color:var(--text-muted)}
.wk-cleans{font-weight:700;color:var(--primary)}
.wk-actions{display:flex;gap:4px;flex-wrap:wrap}

/* ── Stats modal grid ── */
.wk-stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:.5rem;margin:.5rem 0}
.wk-stat-card{text-align:center;padding:.6rem .5rem;border-radius:var(--radius-lg);background:var(--bg);transition:box-shadow .15s}
.wk-stat-card:hover{box-shadow:var(--shadow-sm)}
.wk-stat-val{font-size:1.4rem;font-weight:700;color:var(--primary)}
.wk-stat-label{font-size:.68rem;color:var(--text-muted);margin-top:2px}
.wk-stat-section{margin-top:.75rem;padding-top:.6rem;border-top:1px solid var(--border-light)}
.wk-stat-section-title{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);margin-bottom:.4rem}
.wk-stat-row{display:flex;justify-content:space-between;align-items:center;padding:.2rem 0;font-size:.82rem}
.wk-stat-row-val{font-weight:600}
.wk-stat-footer{margin-top:.75rem;font-size:.75rem;color:var(--text-muted);text-align:center}

/* ── Detail modal ── */
.wk-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem .75rem}
.wk-detail-item{padding:.35rem 0}
.wk-detail-label{font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:1px}
.wk-detail-val{font-size:.88rem;font-weight:500;word-break:break-word}

/* ── Floor assignment modal ── */
.fa-loc-list{display:flex;flex-direction:column;gap:.35rem;max-height:320px;overflow-y:auto}
.fa-loc{display:flex;align-items:center;gap:.55rem;background:var(--bg);padding:.55rem .7rem;border-radius:var(--radius);cursor:pointer;font-size:.85rem;border:1px solid transparent;transition:border-color .1s}
.fa-loc:hover{border-color:var(--border)}
.fa-loc input[type=checkbox]{width:20px;height:20px;accent-color:var(--primary);flex-shrink:0}
.fa-loc-name{flex:1}
.fa-loc-parent{font-size:.68rem;color:var(--text-muted)}
.fa-primary{font-size:.68rem;color:var(--primary);font-weight:600;cursor:pointer;white-space:nowrap}

/* ── Pagination ── */
.wk-pager{display:flex;gap:.35rem;justify-content:center;align-items:center;padding:.75rem 0}
.wk-pager button{padding:.3rem .6rem;font-size:.78rem;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);cursor:pointer;min-height:32px;transition:all .15s}
.wk-pager button:hover{border-color:var(--primary);color:var(--primary)}
.wk-pager button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.wk-pager button:disabled{opacity:.4;cursor:default}
.wk-pager-info{font-size:.75rem;color:var(--text-muted);margin:0 .5rem}

/* ── Modal form tabs ── */
.wk-form-tabs{display:flex;gap:0;border-bottom:2px solid var(--border-light);margin-bottom:.75rem}
.wk-form-tab{padding:.45rem .9rem;font-size:.8rem;font-weight:500;color:var(--text-muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.wk-form-tab:hover{color:var(--text)}
.wk-form-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.wk-form-section{display:none}
.wk-form-section.active{display:block}

/* ── Responsive: phones ≤640px — card fallback ── */
@media(max-width:640px){
  .wk-search{min-width:100%;max-width:100%}
  .wk-dept-filter,.wk-sort{flex:1 1 45%}
  .wk-tbl thead{display:none}
  .wk-tbl tbody tr{display:block;padding:.75rem;margin-bottom:.5rem;border:1px solid var(--border-light);border-radius:var(--radius);background:var(--surface)}
  .wk-tbl tbody tr:nth-child(even){background:var(--surface)}
  .wk-tbl tbody td{display:flex;justify-content:space-between;align-items:center;padding:.25rem 0;border:none;font-size:.82rem}
  .wk-tbl tbody td::before{content:attr(data-label);font-weight:600;font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.03em;flex-shrink:0;margin-right:.5rem}
  .wk-tbl tbody td:first-child{padding-top:0}
  .wk-tbl tbody td:last-child{padding-top:.35rem;justify-content:flex-start}
  .wk-tbl tbody td:last-child::before{display:none}
  .wk-actions{width:100%}
  .wk-desig-sub{display:inline;margin-top:0;margin-left:.25rem}
  .wk-detail-grid{grid-template-columns:1fr}
}

/* ── Tablets ≤768px ── */
@media(max-width:768px){
  .wk-stats-grid{grid-template-columns:repeat(3,1fr)}
  .wk-detail-grid{grid-template-columns:1fr 1fr}
}

/* ── Split screen 769–960px ── */
@media(min-width:769px) and (max-width:960px){
  .wk-tbl{font-size:.78rem}
  .wk-tbl thead th,.wk-tbl tbody td{padding:.4rem .45rem}
  .wk-actions .btn-sm{font-size:.7rem;padding:.15rem .3rem}
  .wk-search{max-width:180px}
}

/* ── Desktop 1280px+ ── */
@media(min-width:1280px){
  .wk-tbl{font-size:.86rem}
}

/* ── Small phones ≤380px ── */
@media(max-width:380px){
  .wk-summary{flex-direction:column;gap:.25rem}
  .wk-pager button{padding:.2rem .4rem;font-size:.72rem;min-height:28px}
  .wk-stat-val{font-size:1.15rem}
}

/* ── Reduced motion ── */
@media(prefers-reduced-motion:reduce){
  *{transition:none!important}
}
</style>
</head>
<body>
<nav class="topbar">
  <div class="topbar-left">
    <button class="nav-toggle" id="nav-toggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
    <span class="topbar-brand">Kodspot</span>
    <div class="topbar-nav" id="topbar-nav"></div>
  </div>
  <div class="topbar-right">
    <span class="topbar-user" id="userName"></span>
    <button class="btn btn-sm btn-ghost" onclick="App.logout()">Logout</button>
  </div>
</nav>
<div class="sa-banner" id="sa-banner"></div>

<main class="container">
  <div class="toolbar">
    <h2 class="toolbar-title">Workers</h2>
    <div class="flex items-center gap-sm" style="flex-wrap:wrap">
      <label class="form-check"><input type="checkbox" id="showInactive" onchange="loadWorkers(1)"> Show inactive</label>
      <button class="btn btn-primary" onclick="openAdd()">+ Add Worker</button>
    </div>
  </div>

  <div id="summaryBar"></div>

  <div class="wk-filters">
    <input class="form-input wk-search" type="search" id="searchInput" placeholder="Search name, ID, phone…" oninput="debounceSearch()">
    <select class="form-select wk-dept-filter" id="deptFilter" onchange="loadWorkers(1)">
      <option value="">All Departments</option>
    </select>
    <select class="form-select wk-sort" id="sortSelect" onchange="loadWorkers(1)">
      <option value="name">Name A–Z</option>
      <option value="name-desc">Name Z–A</option>
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
      <option value="dept">Department</option>
      <option value="cleanings">Most Cleanings</option>
    </select>
  </div>

  <div class="section">
    <div class="table-wrap">
      <table class="wk-tbl" role="table">
        <thead>
          <tr>
            <th>#</th>
            <th>Emp ID</th>
            <th>Name</th>
            <th class="hide-mobile">Phone</th>
            <th class="hide-mobile">Department</th>
            <th class="hide-mobile">Joined</th>
            <th>Cleanings</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="workerBody"><tr><td colspan="9" class="loading-center">Loading…</td></tr></tbody>
      </table>
    </div>
    <div class="wk-pager" id="pager"></div>
  </div>
</main>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal" style="max-width:560px">
    <h2 class="modal-title" id="modalTitle">Add Worker</h2>
    <div id="modalError" class="error-msg"></div>
    <form id="workerForm" autocomplete="off">
      <input type="hidden" id="wId">
      <div class="wk-form-tabs">
        <button type="button" class="wk-form-tab active" onclick="switchTab('basic',this)">Basic Info</button>
        <button type="button" class="wk-form-tab" onclick="switchTab('personal',this)">Personal</button>
        <button type="button" class="wk-form-tab" onclick="switchTab('notes',this)">Notes</button>
      </div>
      <!-- Tab: Basic Info -->
      <div class="wk-form-section active" id="tab-basic">
        <div class="form-row">
          <div class="form-group"><label class="form-label">Name *</label><input class="form-input" type="text" id="wName" required maxlength="100"></div>
          <div class="form-group"><label class="form-label">Employee ID</label><input class="form-input" type="text" id="wEmpId" maxlength="50" placeholder="e.g. EMP-001"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Phone</label><input class="form-input" type="tel" id="wPhone" maxlength="20"></div>
          <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="wEmail" maxlength="200"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Department</label><input class="form-input" type="text" id="wDept" maxlength="100" list="deptSuggestions"></div>
          <div class="form-group"><label class="form-label">Designation</label><input class="form-input" type="text" id="wDesig" maxlength="100"></div>
        </div>
        <datalist id="deptSuggestions"></datalist>
      </div>
      <!-- Tab: Personal -->
      <div class="wk-form-section" id="tab-personal">
        <div class="form-row">
          <div class="form-group"><label class="form-label">Gender</label>
            <select class="form-select" id="wGender"><option value="">—</option><option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option></select>
          </div>
          <div class="form-group"><label class="form-label">Blood Group</label><input class="form-input" type="text" id="wBlood" maxlength="10" placeholder="e.g. O+"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Date of Birth</label><input class="form-input" type="date" id="wDob"></div>
          <div class="form-group"><label class="form-label">Date of Joining</label><input class="form-input" type="date" id="wDoj"></div>
        </div>
        <div class="form-row">
          <div class="form-group" style="grid-column:1/-1"><label class="form-label">Address</label><input class="form-input" type="text" id="wAddress" maxlength="500"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">ID Proof Number</label><input class="form-input" type="text" id="wAadhar" maxlength="20"></div>
        </div>
      </div>
      <!-- Tab: Notes -->
      <div class="wk-form-section" id="tab-notes">
        <div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="wNotes" maxlength="1000" rows="4" placeholder="Any additional notes about this worker…"></textarea></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="App.closeModal('modal')">Cancel</button>
        <button type="submit" class="btn btn-primary" id="saveBtn">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- View Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" style="max-width:520px">
    <h2 class="modal-title" id="detailTitle">Worker Details</h2>
    <div id="detailContent"><div class="loading-center">Loading…</div></div>
    <div class="modal-actions">
      <button type="button" class="btn btn-outline" onclick="App.closeModal('detailModal')">Close</button>
      <button type="button" class="btn btn-primary" id="detailEditBtn" onclick="">Edit</button>
    </div>
  </div>
</div>

<!-- Stats Modal -->
<div class="modal-overlay" id="statsModal">
  <div class="modal" style="max-width:420px">
    <h2 class="modal-title" id="statsTitle">Cleaning Stats</h2>
    <div id="statsContent"><div class="loading-center">Loading…</div></div>
    <div class="modal-actions" style="justify-content:center;margin-top:.5rem">
      <button type="button" class="btn btn-outline" onclick="App.closeModal('statsModal')">Close</button>
    </div>
  </div>
</div>

<!-- Floor Assignment Modal -->
<div class="modal-overlay" id="floorModal">
  <div class="modal" style="max-width:480px">
    <h2 class="modal-title" id="floorTitle">Assign Floors</h2>
    <p style="font-size:.78rem;color:var(--text-muted);margin-bottom:.65rem">Select floors/locations this worker is assigned to for attendance tracking.</p>
    <div id="floorError" class="error-msg"></div>
    <input type="hidden" id="faWorkerId">
    <div id="floorList" class="fa-loc-list"><div class="loading-center">Loading…</div></div>
    <div class="modal-actions">
      <button type="button" class="btn btn-outline" onclick="App.closeModal('floorModal')">Cancel</button>
      <button type="button" class="btn btn-primary" id="floorSaveBtn" onclick="saveFloorAssignments()">Save</button>
    </div>
  </div>
</div>

<script src="/js/app.js?v=8"></script>
<script src="/js/custom-select.js"></script>
<script>
if (!App.initAdmin('workers')) throw '';
App.initNotifications(App.apiFetch);
var esc = App.esc, $ = App.$;
var currentPage = 1, totalPages = 1, allDepts = [];
var searchTimer = null;

function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() { loadWorkers(1); }, 300);
}

async function loadWorkers(page) {
  currentPage = page || 1;
  var showInactive = $('showInactive').checked;
  var search = $('searchInput').value.trim();
  var dept = $('deptFilter').value;
  var sort = $('sortSelect').value;

  var params = ['page=' + currentPage, 'limit=25', 'sort=' + sort];
  if (!showInactive) params.push('active=true');
  if (search) params.push('search=' + encodeURIComponent(search));
  if (dept) params.push('department=' + encodeURIComponent(dept));

  var res = await App.apiFetch('/workers?' + params.join('&'));
  if (!res) return;
  var data = await res.json();
  var workers = data.workers || [];
  totalPages = data.totalPages || 1;
  var total = data.total || 0;

  // Populate department filter (preserve selection)
  if (data.departments && data.departments.length) {
    allDepts = data.departments;
    var curDept = $('deptFilter').value;
    var deptOpts = '<option value="">All Departments</option>';
    allDepts.forEach(function(d) {
      deptOpts += '<option value="' + esc(d) + '"' + (d === curDept ? ' selected' : '') + '>' + esc(d) + '</option>';
    });
    $('deptFilter').innerHTML = deptOpts;

    // Update datalist for form
    var dlHtml = '';
    allDepts.forEach(function(d) { dlHtml += '<option value="' + esc(d) + '">'; });
    $('deptSuggestions').innerHTML = dlHtml;
  }

  // Summary bar
  var active = workers.filter(function(w){return w.isActive !== false}).length;
  var inactive = workers.filter(function(w){return w.isActive === false}).length;
  var totalCleans = workers.reduce(function(s,w){return s + (w._count ? w._count.cleaningRecords : 0)}, 0);
  var deptSet = {};
  workers.forEach(function(w){ if(w.department) deptSet[w.department] = 1; });
  var deptCount = Object.keys(deptSet).length;

  $('summaryBar').innerHTML = '<div class="wk-summary">' +
    '<span class="wk-summary-item"><b>' + total + '</b> total workers</span>' +
    '<span class="wk-summary-item"><b>' + active + '</b> active' + (showInactive && inactive > 0 ? ' · <b>' + inactive + '</b> inactive' : '') + '</span>' +
    '<span class="wk-summary-item"><b>' + totalCleans + '</b> cleanings on this page</span>' +
    (deptCount > 0 ? '<span class="wk-summary-item"><b>' + deptCount + '</b> dept' + (deptCount !== 1 ? 's' : '') + '</span>' : '') +
  '</div>';

  if (!workers.length) {
    $('workerBody').innerHTML = '<tr><td colspan="9" class="empty">' + (search ? 'No workers match "' + esc(search) + '"' : 'No workers found') + '</td></tr>';
    $('pager').innerHTML = '';
    return;
  }

  var startIdx = (currentPage - 1) * 25;
  $('workerBody').innerHTML = workers.map(function(w, i) {
    var num = startIdx + i + 1;
    var cleans = w._count ? w._count.cleaningRecords : 0;
    var statusBadge = w.isActive !== false
      ? '<span class="badge badge-success">Active</span>'
      : '<span class="badge badge-danger">Inactive</span>';

    var joinDate = w.dateOfJoin ? new Date(w.dateOfJoin).toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'}) : '—';

    var actions = '<div class="wk-actions">' +
      '<button class="btn btn-sm btn-outline" onclick="viewWorker(\'' + w.id + '\')" title="View details">View</button>' +
      '<button class="btn btn-sm btn-outline" onclick="openEdit(\'' + w.id + '\')" title="Edit worker">Edit</button>' +
      '<button class="btn btn-sm btn-outline" onclick="openFloors(\'' + w.id + '\',\'' + esc(w.name).replace(/'/g, "\\'") + '\')" title="Floor assignments">Floors</button>' +
      '<button class="btn btn-sm btn-outline" onclick="showStats(\'' + w.id + '\',\'' + esc(w.name).replace(/'/g, "\\'") + '\')" title="Cleaning stats">Stats</button>';

    if (w.isActive !== false) {
      actions += '<button class="btn btn-sm btn-danger" onclick="deactivateWorker(\'' + w.id + '\',\'' + esc(w.name).replace(/'/g, "\\'") + '\')" title="Deactivate worker">Deactivate</button>';
    } else {
      actions += '<button class="btn btn-sm btn-success" onclick="reactivateWorker(\'' + w.id + '\')" title="Reactivate worker">Activate</button>' +
        '<button class="btn btn-sm btn-danger" onclick="permanentDelete(\'' + w.id + '\',\'' + esc(w.name).replace(/'/g, "\\'") + '\')" title="Permanently delete">Delete</button>';
    }
    actions += '</div>';

    var rowClass = w.isActive === false ? ' class="wk-row-inactive"' : '';

    return '<tr' + rowClass + '>' +
      '<td data-label="#">' + num + '</td>' +
      '<td data-label="Emp ID">' + esc(w.employeeId || '—') + '</td>' +
      '<td data-label="Name"><span class="wk-name-cell">' + esc(w.name) + '</span>' +
        (w.designation ? '<span class="wk-desig-sub">' + esc(w.designation) + '</span>' : '') + '</td>' +
      '<td data-label="Phone" class="hide-mobile">' + esc(w.phone || '—') + '</td>' +
      '<td data-label="Department" class="hide-mobile">' + (w.department ? '<span class="badge badge-muted">' + esc(w.department) + '</span>' : '—') + '</td>' +
      '<td data-label="Joined" class="hide-mobile"><span class="wk-doj">' + joinDate + '</span></td>' +
      '<td data-label="Cleanings"><span class="wk-cleans">' + cleans + '</span></td>' +
      '<td data-label="Status">' + statusBadge + '</td>' +
      '<td data-label="Actions">' + actions + '</td>' +
    '</tr>';
  }).join('');

  renderPager();
}

function renderPager() {
  if (totalPages <= 1) { $('pager').innerHTML = ''; return; }
  var html = '<button ' + (currentPage <= 1 ? 'disabled' : 'onclick="loadWorkers(' + (currentPage-1) + ')"') + '>&laquo; Prev</button>';
  var start = Math.max(1, currentPage - 2);
  var end = Math.min(totalPages, currentPage + 2);
  if (start > 1) html += '<button onclick="loadWorkers(1)">1</button>' + (start > 2 ? '<span class="wk-pager-info">…</span>' : '');
  for (var i = start; i <= end; i++) {
    html += '<button class="' + (i === currentPage ? 'active' : '') + '" onclick="loadWorkers(' + i + ')">' + i + '</button>';
  }
  if (end < totalPages) html += (end < totalPages - 1 ? '<span class="wk-pager-info">…</span>' : '') + '<button onclick="loadWorkers(' + totalPages + ')">' + totalPages + '</button>';
  html += '<button ' + (currentPage >= totalPages ? 'disabled' : 'onclick="loadWorkers(' + (currentPage+1) + ')"') + '>Next &raquo;</button>';
  $('pager').innerHTML = html;
}

/* ── Tab switching ── */
function switchTab(tabId, btn) {
  document.querySelectorAll('.wk-form-tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.wk-form-section').forEach(function(s){ s.classList.remove('active'); });
  btn.classList.add('active');
  $('tab-' + tabId).classList.add('active');
}

/* ── Add / Edit ── */
function openAdd() {
  $('modalTitle').textContent = 'Add Worker';
  $('workerForm').reset();
  $('wId').value = '';
  $('wGender').value = '';
  App.hideError('modalError');
  switchTab('basic', document.querySelector('.wk-form-tab'));
  App.openModal('modal');
}

async function openEdit(id) {
  var res = await App.apiFetch('/workers/' + id);
  if (!res || !res.ok) { App.toast('Failed to load worker', 'error'); return; }
  var w = await res.json();
  $('modalTitle').textContent = 'Edit Worker';
  $('wId').value = w.id;
  $('wName').value = w.name || '';
  $('wEmpId').value = w.employeeId || '';
  $('wPhone').value = w.phone || '';
  $('wEmail').value = w.email || '';
  $('wDept').value = w.department || '';
  $('wDesig').value = w.designation || '';
  $('wGender').value = w.gender || '';
  $('wBlood').value = w.bloodGroup || '';
  $('wDob').value = w.dateOfBirth ? w.dateOfBirth.substring(0,10) : '';
  $('wDoj').value = w.dateOfJoin ? w.dateOfJoin.substring(0,10) : '';
  $('wAddress').value = w.address || '';
  $('wAadhar').value = w.aadharNo || '';
  $('wNotes').value = w.notes || '';
  App.hideError('modalError');
  switchTab('basic', document.querySelector('.wk-form-tab'));
  App.openModal('modal');
}

$('workerForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var id = $('wId').value;
  var body = { name: $('wName').value.trim() };

  // Always send all fields so empty strings can clear values
  body.employeeId = $('wEmpId').value.trim() || '';
  body.phone = $('wPhone').value.trim() || '';
  body.email = $('wEmail').value.trim() || '';
  body.department = $('wDept').value.trim() || '';
  body.designation = $('wDesig').value.trim() || '';
  body.gender = $('wGender').value || '';
  body.bloodGroup = $('wBlood').value.trim() || '';
  body.dateOfBirth = $('wDob').value || '';
  body.dateOfJoin = $('wDoj').value || '';
  body.address = $('wAddress').value.trim() || '';
  body.aadharNo = $('wAadhar').value.trim() || '';
  body.notes = $('wNotes').value.trim() || '';

  // For create, strip empty strings to let backend use defaults
  if (!id) {
    Object.keys(body).forEach(function(k) {
      if (k !== 'name' && body[k] === '') delete body[k];
    });
  }

  var saveBtn = $('saveBtn');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving…';

  try {
    var res = await App.apiFetch(id ? '/workers/' + id : '/workers', {
      method: id ? 'PATCH' : 'POST',
      body: JSON.stringify(body)
    });
    if (!res) { saveBtn.disabled = false; saveBtn.textContent = 'Save'; return; }
    if (!res.ok) {
      var d = await res.json();
      App.showError('modalError', d.error || 'Failed');
      saveBtn.disabled = false; saveBtn.textContent = 'Save';
      return;
    }
    App.closeModal('modal');
    App.toast(id ? 'Worker updated' : 'Worker created', 'success');
    loadWorkers(currentPage);
  } catch (err) {
    App.showError('modalError', 'Network error');
  }
  saveBtn.disabled = false;
  saveBtn.textContent = 'Save';
});

/* ── View Detail ── */
async function viewWorker(id) {
  $('detailContent').innerHTML = '<div class="loading-center">Loading…</div>';
  App.openModal('detailModal');
  var res = await App.apiFetch('/workers/' + id);
  if (!res || !res.ok) { $('detailContent').innerHTML = '<div class="error-msg show" style="display:block">Failed to load worker</div>'; return; }
  var w = await res.json();
  $('detailTitle').textContent = w.name;
  $('detailEditBtn').setAttribute('onclick', 'App.closeModal("detailModal");openEdit("' + w.id + '")');

  function row(label, val) {
    return '<div class="wk-detail-item"><div class="wk-detail-label">' + label + '</div><div class="wk-detail-val">' + (val || '—') + '</div></div>';
  }
  var dob = w.dateOfBirth ? new Date(w.dateOfBirth).toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'}) : null;
  var doj = w.dateOfJoin ? new Date(w.dateOfJoin).toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'}) : null;
  var statusBadge = w.isActive !== false
    ? '<span class="badge badge-success">Active</span>'
    : '<span class="badge badge-danger">Inactive</span>';

  $('detailContent').innerHTML = '<div class="wk-detail-grid">' +
    row('Employee ID', esc(w.employeeId)) +
    row('Status', statusBadge) +
    row('Phone', esc(w.phone)) +
    row('Email', esc(w.email)) +
    row('Department', esc(w.department)) +
    row('Designation', esc(w.designation)) +
    row('Gender', esc(w.gender)) +
    row('Date of Birth', dob) +
    row('Date of Joining', doj) +
    row('Blood Group', esc(w.bloodGroup)) +
    row('Address', esc(w.address)) +
    row('ID Proof No', esc(w.aadharNo)) +
  '</div>' +
  (w.notes ? '<div style="margin-top:.75rem"><div class="wk-detail-label">Notes</div><div class="wk-detail-val" style="white-space:pre-wrap">' + esc(w.notes) + '</div></div>' : '');
}

/* ── Status management ── */
async function deactivateWorker(id, name) {
  if (!await App.confirmDialog('Deactivate "' + name + '"? They will be moved to inactive status.')) return;
  var res = await App.apiFetch('/workers/' + id, { method: 'PATCH', body: JSON.stringify({ isActive: false }) });
  if (!res) return;
  if (!res.ok) { App.toast('Failed to deactivate', 'error'); return; }
  App.toast('Worker deactivated', 'success'); loadWorkers(currentPage);
}

async function reactivateWorker(id) {
  var res = await App.apiFetch('/workers/' + id, { method: 'PATCH', body: JSON.stringify({ isActive: true }) });
  if (!res) return;
  if (!res.ok) { App.toast('Failed to activate', 'error'); return; }
  App.toast('Worker activated', 'success'); loadWorkers(currentPage);
}

async function permanentDelete(id, name) {
  if (!await App.confirmDialog('Permanently delete "' + name + '"? This action cannot be undone.')) return;
  var res = await App.apiFetch('/workers/' + id + '/permanent', { method: 'DELETE' });
  if (!res) return;
  if (!res.ok) {
    var d = await res.json();
    App.toast(d.error || 'Failed to delete', 'error');
    return;
  }
  App.toast('Worker permanently deleted', 'success'); loadWorkers(currentPage);
}

/* ── Stats ── */
async function showStats(id, name) {
  $('statsTitle').textContent = name + ' — Analytics';
  $('statsContent').innerHTML = '<div class="loading-center">Loading…</div>';
  App.openModal('statsModal');
  var res = await App.apiFetch('/workers/' + id + '/stats');
  if (!res || !res.ok) { $('statsContent').innerHTML = '<div class="error-msg show" style="display:block">Failed to load stats</div>'; return; }
  var s = await res.json();
  var lastAct = s.lastActivity ? App.fmtDate(s.lastActivity) : 'No activity yet';

  var html = '<div class="wk-stats-grid">' +
    '<div class="wk-stat-card"><div class="wk-stat-val">' + s.daily + '</div><div class="wk-stat-label">Today</div></div>' +
    '<div class="wk-stat-card"><div class="wk-stat-val">' + s.weekly + '</div><div class="wk-stat-label">This Week</div></div>' +
    '<div class="wk-stat-card"><div class="wk-stat-val">' + s.monthly + '</div><div class="wk-stat-label">This Month</div></div>' +
    '<div class="wk-stat-card"><div class="wk-stat-val">' + s.yearly + '</div><div class="wk-stat-label">This Year</div></div>' +
    '<div class="wk-stat-card"><div class="wk-stat-val">' + s.total + '</div><div class="wk-stat-label">All Time</div></div>' +
  '</div>';

  if (s.flagged > 0 || s.lateCount > 0) {
    html += '<div class="wk-stats-grid" style="margin-top:.35rem">';
    if (s.flagged > 0) html += '<div class="wk-stat-card"><div class="wk-stat-val" style="color:var(--danger)">' + s.flagged + '</div><div class="wk-stat-label">Flagged</div></div>';
    if (s.lateCount > 0) html += '<div class="wk-stat-card"><div class="wk-stat-val" style="color:var(--warning)">' + s.lateCount + '</div><div class="wk-stat-label">Late</div></div>';
    html += '</div>';
  }

  if (s.shifts && Object.keys(s.shifts).length > 0) {
    html += '<div class="wk-stat-section"><div class="wk-stat-section-title">Shift Breakdown</div>';
    ['MORNING','AFTERNOON','NIGHT','GENERAL'].forEach(function(sh) {
      if (s.shifts[sh]) html += '<div class="wk-stat-row"><span>' + sh.charAt(0) + sh.slice(1).toLowerCase() + '</span><span class="wk-stat-row-val">' + s.shifts[sh] + '</span></div>';
    });
    html += '</div>';
  }

  if (s.topLocations && s.topLocations.length > 0) {
    html += '<div class="wk-stat-section"><div class="wk-stat-section-title">Top Locations</div>';
    s.topLocations.forEach(function(loc) {
      html += '<div class="wk-stat-row"><span>' + esc(loc.name) + '</span><span class="wk-stat-row-val">' + loc.count + '</span></div>';
    });
    html += '</div>';
  }

  html += '<div class="wk-stat-footer">Last activity: ' + lastAct + '</div>';
  $('statsContent').innerHTML = html;
}

/* ── Floor Assignments ── */
var allLocations = null;

async function loadAllLocations() {
  if (allLocations) return allLocations;
  var res = await App.apiFetch('/locations');
  if (!res) return [];
  var data = await res.json();
  allLocations = data.locations || data || [];
  return allLocations;
}

async function openFloors(workerId, name) {
  $('floorTitle').textContent = 'Assign Floors — ' + name;
  $('faWorkerId').value = workerId;
  $('floorList').innerHTML = '<div class="loading-center">Loading…</div>';
  App.hideError('floorError');
  App.openModal('floorModal');

  var locations = await loadAllLocations();
  var res = await App.apiFetch('/workers/' + workerId + '/assignments');
  var assigned = [];
  if (res && res.ok) {
    var d = await res.json();
    assigned = d.assignments || d || [];
  }
  var assignedMap = {};
  for (var i = 0; i < assigned.length; i++) {
    assignedMap[assigned[i].locationId] = assigned[i].isPrimary || false;
  }

  if (!locations.length) {
    $('floorList').innerHTML = '<div style="text-align:center;padding:1rem;color:var(--text-muted);font-size:.85rem">No locations found. Create locations first.</div>';
    return;
  }

  var html = '';
  for (var j = 0; j < locations.length; j++) {
    var loc = locations[j];
    var checked = assignedMap[loc.id] !== undefined;
    html += '<label class="fa-loc">' +
      '<input type="checkbox" value="' + loc.id + '"' + (checked ? ' checked' : '') + '>' +
      '<span class="fa-loc-name">' + esc(loc.name) + '</span>' +
      '<span class="fa-loc-parent">' + esc(loc.type || '') + '</span>' +
    '</label>';
  }
  $('floorList').innerHTML = html;
}

async function saveFloorAssignments() {
  var workerId = $('faWorkerId').value;
  var checkboxes = $('floorList').querySelectorAll('input[type=checkbox]:checked');
  var locationIds = [];
  for (var i = 0; i < checkboxes.length; i++) {
    locationIds.push(checkboxes[i].value);
  }

  var btn = $('floorSaveBtn');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  App.hideError('floorError');

  try {
    var res = await App.apiFetch('/workers/' + workerId + '/assignments', {
      method: 'PUT',
      body: JSON.stringify({ locationIds: locationIds })
    });
    if (!res) { btn.disabled = false; btn.textContent = 'Save'; return; }
    if (!res.ok) {
      var d = await res.json();
      App.showError('floorError', d.error || 'Failed to save');
      btn.disabled = false; btn.textContent = 'Save';
      return;
    }
    App.closeModal('floorModal');
    App.toast('Floor assignments updated (' + locationIds.length + ' floor' + (locationIds.length !== 1 ? 's' : '') + ')', 'success');
  } catch (err) {
    App.showError('floorError', 'Network error');
  }
  btn.disabled = false;
  btn.textContent = 'Save';
}

loadWorkers(1);
</script>
